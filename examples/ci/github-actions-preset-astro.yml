# Use when an Astro repository has a committed search-quality config based on presets.astro().
name: Search Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  search-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check Astro output
        run: |
          npx @silesiansolutions/search-quality-kit verify \
            --skip-build \
            --baseline search-quality-baseline.json \
            --fail-on-new \
            --json \
            --output search-quality-report.json
      - name: Add Markdown report to the job summary
        if: always()
        run: |
          npx @silesiansolutions/search-quality-kit report search-quality-report.json \
            --format markdown \
            --output search-quality-report.md
          cat search-quality-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: search-quality-report
          path: |
            search-quality-report.json
            search-quality-report.md
