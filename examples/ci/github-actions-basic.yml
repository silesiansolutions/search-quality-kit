name: Search Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  search-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run search quality audit
        run: npx @silesiansolutions/search-quality-kit verify --skip-build --json --output search-quality-report.json
      - name: Create Markdown report
        if: always()
        run: npx @silesiansolutions/search-quality-kit report search-quality-report.json --format markdown --output search-quality-report.md
      - name: Add report to workflow summary
        if: always()
        run: cat search-quality-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: search-quality-report
          path: |
            search-quality-report.json
            search-quality-report.md
