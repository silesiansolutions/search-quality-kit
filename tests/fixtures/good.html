<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width" />
    <title>A useful example page</title>
    <meta
      name="description"
      content="A sufficiently detailed summary of this useful example page for visitors."
    />
    <link rel="canonical" href="https://example.com/" />
    <meta property="og:title" content="A useful example page" />
    <meta property="og:description" content="A useful summary" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:type" content="website" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Example"
      }
    </script>
  </head>
  <body>
    <main>
      <h1>Example</h1>
      <p>
        This is substantial visible content for a useful public page that can be
        indexed.
      </p>
    </main>
  </body>
</html>
